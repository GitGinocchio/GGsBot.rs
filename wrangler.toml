name = "ggsbotrs"
workers_dev = true
compatibility_date = "2026-04-14"

main = "build/index.js"

[[kv_namespaces]]
binding = "ggsbotkv"
id = "c1c5302906b04ad1af9c6f87b80f1367"

[triggers]
crons = [
    "0 7 * * *"
]

[[queues.producers]]
binding = "APOD_QUEUE"
queue = "ggsbotrs-apod-queue"
#delivery_delay = 60

[[queues.consumers]]
queue = "ggsbotrs-apod-queue"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 5
max_concurrency = 3
retry_delay = 120
#dead_letter_queue = "my-queue-dlq"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[build]
command = "cargo install -q worker-build && worker-build --release" # required

[assets]
directory = "./dist"

[vars]
WORKER_ENV = "production"
DISCORD_DEVELOPER_ID = "778017089230209045"

[env.production.vars]
WORKER_ENV = "production"
DISCORD_DEVELOPER_ID = "778017089230209045"

[env.local.vars]
WORKER_ENV = "dev"
DISCORD_DEVELOPER_ID = "778017089230209045"

[version_metadata]
binding = "metadata"

# read more about configuring your Worker via wrangler.toml at:
# https://developers.cloudflare.com/workers/cli-wrangler/configuration
